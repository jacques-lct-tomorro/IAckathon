# fly.toml app configuration file generated for iackathon on 2026-04-16T12:32:39+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'iackathon'
primary_region = 'cdg'

[build]

# One-time: fly volumes create session_data --region cdg --size 1
[[mounts]]
  source = 'session_data'
  destination = '/data'

[env]
  SESSION_SQLITE_PATH = '/data/sessions.sqlite'

[http_service]
  internal_port = 3000
  force_https = true
  # Keep at least one machine so in-memory express-session survives between visits (auto_stop clears sessions).
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
